services:
  postgres:
    image: postgres:16-alpine
    container_name: gmp-erp-postgres
    environment:
      POSTGRES_DB: gmp_erp
      POSTGRES_USER: gmp_user
      POSTGRES_PASSWORD: gmp_pass
    ports:
      - "5434:5432"
    volumes:
      - gmp_erp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gmp_user -d gmp_erp"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: gmp-erp-backend
    environment:
      GMP_DATABASE_URL: postgresql+psycopg://gmp_user:gmp_pass@postgres:5432/gmp_erp
      GMP_SECRET_KEY: dev-change-me
      GMP_QC_SCAN_ROOT: /data/qc-scans
    ports:
      - "8002:8000"
    volumes:
      # GMP true-copy scans of signed Ф-14 notifications. On-prem deploy: bind
      # this to a backed-up disk on the factory server. Pilot uses a named volume.
      - gmp_erp_qc_scans:/data/qc-scans
      # Photo evidence for receipt defect acts (СОП-209 Ф-12). Same disk
      # treatment as QC scans — backed up and tamper-tracked by sha256.
      - gmp_erp_defect_photos:/data/receipt-defect-photos
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: gmp-erp-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  gmp_erp_postgres_data:
  gmp_erp_qc_scans:
  gmp_erp_defect_photos:
